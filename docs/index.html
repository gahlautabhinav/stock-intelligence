<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Intelligence PA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="masthead">
    <div class="masthead-top">
      <span class="wordmark">Stock Intelligence PA</span>
      <div class="masthead-meta">
        <span class="market-badge" id="marketStatus"></span>
        <span class="refresh-time" id="lastRefresh"></span>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          <span id="themeLabel">Dark</span>
        </button>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="today">Today</button>
      <button class="tab" data-tab="history">History</button>
      <button class="tab" data-tab="stats">Performance</button>
    </nav>
  </header>

  <main>
    <div id="tab-today"   class="tab-content active"></div>
    <div id="tab-history" class="tab-content"></div>
    <div id="tab-stats"   class="tab-content"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="wordmark" style="color:#fff">Stock Intelligence PA</span>
      <span class="footer-note">AI analysis — Not financial advice. Auto-updates every 5 min.</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
